<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teachers — OSEDu Admin</title>
<link rel="stylesheet" href="/static/css/osec.css">
</head>
<body>
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="openSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <div style="font-family:var(--fd);font-weight:600;font-size:16px">Teachers</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openModal()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Add Teacher
      </button>
    </header>

    <main class="page-content">
      <div class="card">
        <div class="card-header">
          <div class="search-bar">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="searchInput" placeholder="Search by name, ID, email…" oninput="debSearch()">
          </div>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--g6);cursor:pointer">
            <input type="checkbox" id="showInactive" onchange="loadTeachers()"> Show inactive
          </label>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Teacher ID</th>
                <th>Email</th>
                <th>Subject</th>
                <th>Courses</th>
                <th>Status</th>
                <th style="text-align:right">Actions</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>

<!-- Add / Edit Teacher Modal -->
<div class="modal-backdrop hidden" id="modal">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3 id="modalTitle">Add Teacher</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="modalErr" class="alert alert-error hidden"></div>
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input id="fName" type="text" placeholder="Priya Sharma"></div>
        <div class="form-group"><label>Email *</label><input id="fEmail" type="email" placeholder="priya@osec.in"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Phone *</label><input id="fPhone" type="text" placeholder="9XXXXXXXXX"></div>
        <div class="form-group"><label>Password <span id="passRequired">*</span></label><input id="fPass" type="password" placeholder="Min 6 chars"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Subject Expertise</label><input id="fSubject" type="text" placeholder="e.g. Computer Science, Web Dev"></div>
        <div class="form-group"><label>Qualification</label><input id="fQual" type="text" placeholder="e.g. B.Tech CSE"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date of Birth</label><input id="fDob" type="date"></div>
        <div class="form-group"><label>Gender</label>
          <select id="fGender">
            <option value="">Select…</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Address</label><input id="fAddr" type="text" placeholder="Village, District, Assam"></div>
      <div class="form-group">
        <label>Authorized Course IDs</label>
        <textarea id="fTeaches" placeholder="OSEC-CRS-XXXXXX&#10;OSEC-CRS-YYYYYY" style="min-height:70px;font-family:var(--fm);font-size:12px"></textarea>
        <div class="form-hint">One Course ID per line. Teacher will only be able to teach and manage these courses.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveTeacher()">Add Teacher</button>
    </div>
  </div>
</div>

<!-- View Teacher Modal -->
<div class="modal-backdrop hidden" id="viewModal">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3>Teacher Profile</h3>
      <button class="modal-close" onclick="document.getElementById('viewModal').classList.add('hidden')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="viewBody"></div>
    <div class="modal-footer" id="viewFooter"></div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/sidebar.js"></script>
<script>
if (!requireAdmin()) throw "";
renderSidebar("teachers", "admin");

let page = 1, searchVal = "", editId = null, debTimer = null;
function debSearch() {
  clearTimeout(debTimer);
  debTimer = setTimeout(() => { searchVal = document.getElementById("searchInput").value.trim(); page = 1; loadTeachers(); }, 350);
}

async function loadTeachers() {
  const inc = document.getElementById("showInactive").checked ? "&include_inactive=true" : "";
  const res = await api.get(`/admin/teachers?page=${page}&per_page=20&search=${encodeURIComponent(searchVal)}${inc}`);
  if (!res?.ok) return;
  const { teachers = [], pagination = {} } = res.data;
  const tbody = document.getElementById("tbody");

  if (!teachers.length) {
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="empty">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <p>No teachers yet. Add your first teacher.</p>
      </div></td></tr>`;
    document.getElementById("pagination").innerHTML = ""; return;
  }

  tbody.innerHTML = teachers.map(t => `<tr>
    <td>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:30px;height:30px;border-radius:50%;background:var(--g2);border:1px solid var(--g3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:var(--fd);flex-shrink:0">
          ${escHtml((t.name||"?")[0].toUpperCase())}
        </div>
        <span style="font-weight:500">${escHtml(t.name)}</span>
      </div>
    </td>
    <td><span class="mono">${escHtml(t.teacher_id)}</span></td>
    <td style="color:var(--g6)">${escHtml(t.email || "—")}</td>
    <td>${escHtml(t.subject_expertise || "—")}</td>
    <td>
      <span class="badge badge-outline">${(t.teaches || []).length} course${(t.teaches||[]).length !== 1 ? "s" : ""}</span>
    </td>
    <td>${statusBadge(t.active ? "active" : "inactive")}</td>
    <td style="text-align:right;display:flex;gap:6px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick='viewTeacher(${JSON.stringify(t)})'>View</button>
      <button class="btn btn-ghost btn-sm" onclick='openEdit(${JSON.stringify(t)})'>Edit</button>
      ${t.active
        ? `<button class="btn btn-danger btn-sm" onclick="deactivate('${t.teacher_id}')">Deactivate</button>`
        : `<button class="btn btn-secondary btn-sm" onclick="reactivate('${t.teacher_id}')">Reactivate</button>`}
    </td>
  </tr>`).join("");

  const el = document.getElementById("pagination");
  let html = "";
  for (let i = 1; i <= pagination.pages; i++)
    html += `<button class="page-btn${i === page ? " active" : ""}" onclick="page=${i};loadTeachers()">${i}</button>`;
  el.innerHTML = html;
}

function openModal() {
  editId = null;
  document.getElementById("modalTitle").textContent = "Add Teacher";
  document.getElementById("saveBtn").textContent    = "Add Teacher";
  document.getElementById("passRequired").textContent = "*";
  ["fName","fEmail","fPhone","fPass","fSubject","fQual","fDob","fAddr","fTeaches"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("fGender").value = "";
  document.getElementById("modalErr").classList.add("hidden");
  document.getElementById("modal").classList.remove("hidden");
}

function openEdit(t) {
  editId = t.teacher_id;
  document.getElementById("modalTitle").textContent = "Edit Teacher";
  document.getElementById("saveBtn").textContent    = "Save Changes";
  document.getElementById("passRequired").textContent = "(leave blank to keep)";
  document.getElementById("fName").value    = t.name || "";
  document.getElementById("fEmail").value   = t.email || "";
  document.getElementById("fPhone").value   = t.phone || "";
  document.getElementById("fPass").value    = "";
  document.getElementById("fSubject").value = t.subject_expertise || "";
  document.getElementById("fQual").value    = t.qualification || "";
  document.getElementById("fDob").value     = t.dob || "";
  document.getElementById("fGender").value  = t.gender || "";
  document.getElementById("fAddr").value    = t.address || "";
  document.getElementById("fTeaches").value = (t.teaches || []).join("\n");
  document.getElementById("modalErr").classList.add("hidden");
  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() { document.getElementById("modal").classList.add("hidden"); }

async function saveTeacher() {
  const btn = document.getElementById("saveBtn");
  const err = document.getElementById("modalErr");
  err.classList.add("hidden");

  const teaches = document.getElementById("fTeaches").value.split("\n").map(s => s.trim()).filter(Boolean);
  const data = {
    name              : document.getElementById("fName").value.trim(),
    email             : document.getElementById("fEmail").value.trim(),
    phone             : document.getElementById("fPhone").value.trim(),
    subject_expertise : document.getElementById("fSubject").value.trim(),
    qualification     : document.getElementById("fQual").value.trim(),
    dob               : document.getElementById("fDob").value,
    gender            : document.getElementById("fGender").value,
    address           : document.getElementById("fAddr").value.trim(),
    teaches,
  };
  const pw = document.getElementById("fPass").value;
  if (pw) data.password = pw;

  if (!editId) {
    if (!data.name || !data.email || !data.phone || !pw) {
      err.textContent = "Name, email, phone and password are required.";
      err.classList.remove("hidden"); return;
    }
  } else {
    if (!data.name || !data.email) {
      err.textContent = "Name and email are required.";
      err.classList.remove("hidden"); return;
    }
  }

  showLoading(btn, editId ? "Saving…" : "Adding…");
  const res = editId
    ? await api.put(`/admin/teachers/${editId}`, data)
    : await api.post("/admin/teachers", data);
  stopLoading(btn);

  if (res?.ok) {
    closeModal();
    showToast(editId ? "Teacher updated" : "Teacher added", "success");
    loadTeachers();
  } else {
    err.textContent = res?.data?.error || "Save failed.";
    err.classList.remove("hidden");
  }
}

function viewTeacher(t) {
  document.getElementById("viewBody").innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 24px">
      ${[
        ["Name",        t.name],
        ["Teacher ID",  `<span class="mono">${escHtml(t.teacher_id)}</span>`],
        ["Email",       t.email || "—"],
        ["Phone",       t.phone || "—"],
        ["Expertise",   t.subject_expertise || "—"],
        ["Qualification", t.qualification || "—"],
        ["Date of Birth", t.dob || "—"],
        ["Gender",      t.gender || "—"],
        ["Status",      statusBadge(t.active ? "active" : "inactive")],
        ["Added",       formatDate(t.created_at)],
      ].map(([label, val]) => `
        <div>
          <div style="font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--g5);margin-bottom:3px">${label}</div>
          <div style="font-size:13.5px">${val}</div>
        </div>`).join("")}
      <div style="grid-column:1/-1">
        <div style="font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--g5);margin-bottom:6px">Authorized Courses</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${(t.teaches || []).length
            ? (t.teaches).map(cid => `<span class="badge badge-outline mono">${escHtml(cid)}</span>`).join("")
            : `<span style="font-size:13px;color:var(--g5)">No courses assigned</span>`}
        </div>
      </div>
      <div style="grid-column:1/-1">
        <div style="font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--g5);margin-bottom:3px">Address</div>
        <div style="font-size:13.5px">${escHtml(t.address || "—")}</div>
      </div>
    </div>`;
  document.getElementById("viewFooter").innerHTML = `
    <button class="btn btn-secondary" onclick="document.getElementById('viewModal').classList.add('hidden')">Close</button>
    <button class="btn btn-primary" onclick='document.getElementById("viewModal").classList.add("hidden");openEdit(${JSON.stringify(t)})'>Edit</button>`;
  document.getElementById("viewModal").classList.remove("hidden");
}

async function deactivate(teacherId) {
  if (!confirm("Deactivate this teacher? They will no longer be able to log in.")) return;
  const res = await api.delete(`/admin/teachers/${teacherId}`);
  if (res?.ok) { showToast("Teacher deactivated", "success"); loadTeachers(); }
  else showToast(res?.data?.error || "Failed", "error");
}

async function reactivate(teacherId) {
  const res = await api.put(`/admin/teachers/${teacherId}`, { active: true });
  if (res?.ok) { showToast("Teacher reactivated", "success"); loadTeachers(); }
  else showToast(res?.data?.error || "Failed", "error");
}

loadTeachers();
</script>
</body>
</html>
