<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Results — OSEDu Admin</title>
<link rel="stylesheet" href="/static/css/osec.css">
</head>
<body>
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="openSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <div style="font-family:var(--fd);font-weight:600;font-size:16px">Exam Results</div>
      </div>
    </header>
    <main class="page-content">
      <div class="card">
        <div class="card-header">
          <div class="search-bar">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="searchInput" placeholder="Search by student or exam ID…" oninput="debSearch()">
          </div>
          <div style="display:flex;gap:8px">
            <select id="passFilter" style="width:130px" onchange="page=1;loadResults()">
              <option value="">All</option>
              <option value="true">Passed</option>
              <option value="false">Failed</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Student</th><th>Exam</th><th>Score</th><th>%</th><th>Grade</th><th>MCQ</th><th>Written</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/sidebar.js"></script>
<script>
if (!requireAdmin()) throw "";
renderSidebar("results","admin");
let page=1, searchVal="", debTimer=null;
function debSearch(){clearTimeout(debTimer);debTimer=setTimeout(()=>{searchVal=document.getElementById("searchInput").value.trim();page=1;loadResults();},350);}

async function loadResults(){
  const pf=document.getElementById("passFilter").value;
  const res=await api.get(`/admin/results?page=${page}&per_page=20&search=${encodeURIComponent(searchVal)}${pf!=""?"&passed="+pf:""}`);
  if(!res?.ok) return;
  const {results=[],pagination={}} = res.data;
  if(!results.length){
    document.getElementById("tbody").innerHTML=`<tr><td colspan="9"><div class="empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg><p>No results yet.</p></div></td></tr>`;
    document.getElementById("pagination").innerHTML=""; return;
  }
  document.getElementById("tbody").innerHTML=results.map(r=>`<tr>
    <td><span class="mono">${escHtml(r.student_id)}</span></td>
    <td><span class="mono" style="font-size:11px">${escHtml(r.exam_id)}</span></td>
    <td>${r.scored_marks??'—'} / ${r.total_marks??'—'}</td>
    <td>${r.percentage!=null?r.percentage+'%':'—'}</td>
    <td><span class="grade ${gradeClass(r.grade)}">${escHtml(r.grade||'—')}</span></td>
    <td>${r.mcq_score??'—'}</td>
    <td>${r.written_score??'—'}</td>
    <td>${statusBadge(r.passed?'passed':'failed')}</td>
    <td>${formatDate(r.created_at)}</td>
  </tr>`).join("");
  const el=document.getElementById("pagination"); let html="";
  for(let i=1;i<=pagination.pages;i++) html+=`<button class="page-btn${i===page?" active":""}" onclick="page=${i};loadResults()">${i}</button>`;
  el.innerHTML=html;
}
loadResults();
</script>
</body></html>
