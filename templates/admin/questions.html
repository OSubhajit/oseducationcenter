<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Question Bank — OSEDu Admin</title>
<link rel="stylesheet" href="/static/css/osec.css">
</head>
<body>
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="openSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <div style="font-family:var(--fd);font-weight:600;font-size:16px">Question Bank</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openModal()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Add Question
      </button>
    </header>

    <main class="page-content">
      <div class="card">
        <div class="card-header" style="flex-wrap:wrap;gap:10px">
          <div class="search-bar" style="flex:1;min-width:200px">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="searchInput" placeholder="Search question text…" oninput="debSearch()">
          </div>
          <select id="filterType" onchange="page=1;loadQuestions()" style="width:auto">
            <option value="">All types</option>
            <option value="mcq">MCQ</option>
            <option value="written">Written</option>
          </select>
          <select id="filterDifficulty" onchange="page=1;loadQuestions()" style="width:auto">
            <option value="">All difficulties</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
          <select id="filterCategory" onchange="page=1;loadQuestions()" style="width:auto">
            <option value="">All categories</option>
          </select>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--g6);cursor:pointer">
            <input type="checkbox" id="showInactive" onchange="page=1;loadQuestions()"> Show inactive
          </label>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Question</th>
                <th>Type</th>
                <th>Category</th>
                <th>Difficulty</th>
                <th>Marks</th>
                <th>Status</th>
                <th style="text-align:right">Actions</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>

<!-- Add / Edit Question Modal -->
<div class="modal-backdrop hidden" id="modal">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3 id="modalTitle">Add Question</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="modalErr" class="alert alert-error hidden"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Question Type *</label>
          <select id="fType" onchange="onTypeChange()">
            <option value="mcq">Multiple Choice (MCQ)</option>
            <option value="written">Written (AI-graded)</option>
          </select>
          <div class="form-hint" id="typeLockHint" style="display:none">Type cannot be changed after creation.</div>
        </div>
        <div class="form-group"><label>Marks *</label><input id="fMarks" type="number" min="1" value="1"></div>
      </div>

      <div class="form-group">
        <label>Question Text *</label>
        <textarea id="fQuestionText" placeholder="e.g. What does HTML stand for?" style="min-height:70px"></textarea>
      </div>

      <!-- MCQ-specific fields -->
      <div id="mcqFields">
        <div class="form-group">
          <label>Options *</label>
          <div class="form-hint" style="margin-bottom:6px">At least 2 options required. Leave unused options blank.</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;align-items:center;gap:8px"><span class="mono" style="width:20px;font-weight:700">A</span><input id="fOptA" type="text" placeholder="Option A text"></div>
            <div style="display:flex;align-items:center;gap:8px"><span class="mono" style="width:20px;font-weight:700">B</span><input id="fOptB" type="text" placeholder="Option B text"></div>
            <div style="display:flex;align-items:center;gap:8px"><span class="mono" style="width:20px;font-weight:700">C</span><input id="fOptC" type="text" placeholder="Option C text (optional)"></div>
            <div style="display:flex;align-items:center;gap:8px"><span class="mono" style="width:20px;font-weight:700">D</span><input id="fOptD" type="text" placeholder="Option D text (optional)"></div>
          </div>
        </div>
        <div class="form-group">
          <label>Correct Answer *</label>
          <select id="fCorrect">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
          </select>
        </div>
      </div>

      <!-- Written-specific fields -->
      <div id="writtenFields" class="hidden">
        <div class="form-group">
          <label>AI Grading Rubric *</label>
          <textarea id="fRubric" placeholder="Describe what a correct/full-marks answer must cover. The AI grader uses this to score the student's written answer." style="min-height:80px"></textarea>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <input id="fCategory" type="text" list="categoryList" placeholder="e.g. Web Development">
          <datalist id="categoryList"></datalist>
        </div>
        <div class="form-group">
          <label>Difficulty</label>
          <select id="fDifficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Tags</label>
        <input id="fTags" type="text" placeholder="comma, separated, tags">
        <div class="form-hint">Used for filtering when building exams.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveQuestion()">Add Question</button>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/sidebar.js"></script>
<script>
if (!requireAdmin()) throw "";
renderSidebar("questions", "admin");

let page = 1, searchVal = "", editId = null, debTimer = null;

function debSearch() {
  clearTimeout(debTimer);
  debTimer = setTimeout(() => { searchVal = document.getElementById("searchInput").value.trim(); page = 1; loadQuestions(); }, 350);
}

function typeBadge(type) {
  return type === "mcq"
    ? `<span class="badge badge-info">MCQ</span>`
    : `<span class="badge badge-outline">Written</span>`;
}

function difficultyBadge(d) {
  const map = { easy: "badge-success", medium: "badge-warning", hard: "badge-danger" };
  return `<span class="badge ${map[d] || "badge-outline"}">${escHtml(d || "—")}</span>`;
}

async function loadCategories() {
  const res = await api.get("/questions/categories");
  if (!res?.ok) return;
  const sel = document.getElementById("filterCategory");
  const dl  = document.getElementById("categoryList");
  const current = sel.value;
  sel.innerHTML = `<option value="">All categories</option>` +
    (res.data.categories || []).map(c => `<option value="${escHtml(c)}">${escHtml(c)}</option>`).join("");
  sel.value = current;
  dl.innerHTML = (res.data.categories || []).map(c => `<option value="${escHtml(c)}">`).join("");
}

async function loadQuestions() {
  const params = new URLSearchParams({ page, per_page: 20 });
  if (searchVal) params.set("search", searchVal);
  const type = document.getElementById("filterType").value;
  if (type) params.set("type", type);
  const diff = document.getElementById("filterDifficulty").value;
  if (diff) params.set("difficulty", diff);
  const cat = document.getElementById("filterCategory").value;
  if (cat) params.set("category", cat);
  if (!document.getElementById("showInactive").checked) params.set("active", "true");

  const res = await api.get(`/questions/?${params.toString()}`);
  if (!res?.ok) return;
  const { questions = [], pagination = {} } = res.data;
  const tbody = document.getElementById("tbody");

  if (!questions.length) {
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="empty">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        <p>No questions yet. Add your first question to start building exams.</p>
      </div></td></tr>`;
    document.getElementById("pagination").innerHTML = ""; return;
  }

  tbody.innerHTML = questions.map(q => `<tr>
    <td style="max-width:380px">
      <div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(q.question_text)}</div>
      <div class="mono" style="font-size:11px;color:var(--g5);margin-top:2px">${escHtml(q.question_id)}</div>
    </td>
    <td>${typeBadge(q.type)}</td>
    <td style="color:var(--g6)">${escHtml(q.category || "—")}</td>
    <td>${difficultyBadge(q.difficulty)}</td>
    <td>${q.marks}</td>
    <td>${statusBadge(q.active ? "active" : "inactive")}</td>
    <td style="text-align:right;display:flex;gap:6px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick='openEdit(${JSON.stringify(q)})'>Edit</button>
      ${q.active
        ? `<button class="btn btn-danger btn-sm" onclick="deactivate('${q.question_id}')">Deactivate</button>`
        : `<button class="btn btn-secondary btn-sm" onclick="reactivate('${q.question_id}')">Reactivate</button>`}
    </td>
  </tr>`).join("");

  const el = document.getElementById("pagination");
  let html = "";
  for (let i = 1; i <= pagination.pages; i++)
    html += `<button class="page-btn${i === page ? " active" : ""}" onclick="page=${i};loadQuestions()">${i}</button>`;
  el.innerHTML = html;
}

function onTypeChange() {
  const isMcq = document.getElementById("fType").value === "mcq";
  document.getElementById("mcqFields").classList.toggle("hidden", !isMcq);
  document.getElementById("writtenFields").classList.toggle("hidden", isMcq);
}

function openModal() {
  editId = null;
  document.getElementById("modalTitle").textContent = "Add Question";
  document.getElementById("saveBtn").textContent    = "Add Question";
  document.getElementById("fType").disabled = false;
  document.getElementById("typeLockHint").style.display = "none";
  document.getElementById("fType").value = "mcq";
  document.getElementById("fMarks").value = 1;
  document.getElementById("fQuestionText").value = "";
  ["fOptA","fOptB","fOptC","fOptD"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("fCorrect").value = "A";
  document.getElementById("fRubric").value = "";
  document.getElementById("fCategory").value = "";
  document.getElementById("fDifficulty").value = "medium";
  document.getElementById("fTags").value = "";
  onTypeChange();
  document.getElementById("modalErr").classList.add("hidden");
  document.getElementById("modal").classList.remove("hidden");
}

function openEdit(q) {
  editId = q.question_id;
  document.getElementById("modalTitle").textContent = "Edit Question";
  document.getElementById("saveBtn").textContent    = "Save Changes";
  document.getElementById("fType").value = q.type;
  document.getElementById("fType").disabled = true;
  document.getElementById("typeLockHint").style.display = "block";
  document.getElementById("fMarks").value = q.marks;
  document.getElementById("fQuestionText").value = q.question_text || "";

  const opts = q.options || [];
  ["A","B","C","D"].forEach((label, i) => {
    const opt = opts.find(o => (o.label||"").toUpperCase() === label);
    document.getElementById("fOpt" + label).value = opt ? opt.text : "";
  });
  document.getElementById("fCorrect").value = (q.correct_answer || "A").toUpperCase();
  document.getElementById("fRubric").value = q.ai_rubric || "";

  document.getElementById("fCategory").value = q.category || "";
  document.getElementById("fDifficulty").value = q.difficulty || "medium";
  document.getElementById("fTags").value = (q.tags || []).join(", ");

  onTypeChange();
  document.getElementById("modalErr").classList.add("hidden");
  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() { document.getElementById("modal").classList.add("hidden"); }

async function saveQuestion() {
  const btn = document.getElementById("saveBtn");
  const err = document.getElementById("modalErr");
  err.classList.add("hidden");

  const type        = document.getElementById("fType").value;
  const questionText = document.getElementById("fQuestionText").value.trim();
  const marks        = parseInt(document.getElementById("fMarks").value, 10);
  const category     = document.getElementById("fCategory").value.trim();
  const difficulty   = document.getElementById("fDifficulty").value;
  const tags         = document.getElementById("fTags").value.split(",").map(s => s.trim()).filter(Boolean);

  if (!questionText) { err.textContent = "Question text is required."; err.classList.remove("hidden"); return; }
  if (!marks || marks < 1) { err.textContent = "Marks must be at least 1."; err.classList.remove("hidden"); return; }

  const data = {
    question_text: questionText,
    marks, category, difficulty, tags,
  };
  if (!editId) data.type = type;

  if (type === "mcq") {
    const labels = ["A","B","C","D"];
    const options = labels
      .map(label => ({ label, text: document.getElementById("fOpt" + label).value.trim() }))
      .filter(o => o.text);
    if (options.length < 2) {
      err.textContent = "MCQ questions need at least 2 non-empty options."; err.classList.remove("hidden"); return;
    }
    const correct = document.getElementById("fCorrect").value;
    if (!options.some(o => o.label === correct)) {
      err.textContent = `Option ${correct} is empty — choose a correct answer with text filled in.`; err.classList.remove("hidden"); return;
    }
    data.options = options;
    data.correct_answer = correct;
  } else {
    const rubric = document.getElementById("fRubric").value.trim();
    if (!rubric) { err.textContent = "AI grading rubric is required for written questions."; err.classList.remove("hidden"); return; }
    data.ai_rubric = rubric;
  }

  showLoading(btn, editId ? "Saving…" : "Adding…");
  const res = editId
    ? await api.put(`/questions/${editId}`, data)
    : await api.post("/questions/", data);
  stopLoading(btn);

  if (res?.ok) {
    closeModal();
    showToast(editId ? "Question updated" : "Question added", "success");
    loadCategories();
    loadQuestions();
  } else {
    err.textContent = res?.data?.error || "Save failed.";
    err.classList.remove("hidden");
  }
}

async function deactivate(questionId) {
  if (!confirm("Deactivate this question? It will no longer be selectable for new exams.")) return;
  const res = await api.delete(`/questions/${questionId}`);
  if (res?.ok) { showToast("Question deactivated", "success"); loadQuestions(); }
  else showToast(res?.data?.error || "Failed", "error");
}

async function reactivate(questionId) {
  const res = await api.put(`/questions/${questionId}`, { active: true });
  if (res?.ok) { showToast("Question reactivated", "success"); loadQuestions(); }
  else showToast(res?.data?.error || "Failed", "error");
}

loadCategories();
loadQuestions();
</script>
</body>
</html>
