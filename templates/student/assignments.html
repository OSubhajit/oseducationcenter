<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Assignments — OSEDu Student</title>
<link rel="stylesheet" href="/static/css/osec.css">
</head>
<body>
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="openSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <div style="font-family:var(--fd);font-weight:600;font-size:16px">Assignments</div>
      </div>
      <div style="font-size:13px;color:var(--g6)">My Tasks</div>
    </header>
    <main class="page-content">
      <div class="card">
        <div class="card-header">
          <span class="card-title" id="aCount">Assignments</span>
          <select id="courseFilter" style="width:200px" onchange="page=1;loadAssignments()">
            <option value="">All my courses</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Title</th><th>Course</th><th>Due Date</th><th>Max Score</th><th>My Status</th><th style="text-align:right">Action</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>

<!-- Submit Assignment Modal -->
<div class="modal-backdrop hidden" id="submitModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 id="submitTitle">Submit Assignment</h3>
      <button class="modal-close" onclick="closeModal('submitModal')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div id="submitErr" class="alert alert-error hidden"></div>
      <div id="aDesc" style="background:var(--g1);padding:10px 12px;border-radius:6px;font-size:13px;margin-bottom:14px;color:var(--g7)"></div>
      <div class="form-group">
        <label>Submission Type</label>
        <select id="subType" onchange="toggleSubType()">
          <option value="file">Upload File</option>
          <option value="text">Text Answer</option>
        </select>
      </div>
      <div id="fileSection" class="form-group"><label>File *</label><input id="subFile" type="file"></div>
      <div id="textSection" class="form-group hidden"><label>Answer *</label><textarea id="subText" rows="5" placeholder="Type your answer here…" style="resize:vertical"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('submitModal')">Cancel</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitAssignment()">Submit</button>
    </div>
  </div>
</div>

<!-- View Submission Modal -->
<div class="modal-backdrop hidden" id="viewModal">
  <div class="modal">
    <div class="modal-header">
      <h3>My Submission</h3>
      <button class="modal-close" onclick="closeModal('viewModal')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body" id="viewContent"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('viewModal')">Close</button>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/sidebar.js"></script>
<script>
if (!requireStudent()) throw "";
renderSidebar("assignments", "student");

let page = 1, activeAssignmentId = null, submissionsMap = {};

function toggleSubType() {
  const isFile = document.getElementById("subType").value === "file";
  document.getElementById("fileSection").classList.toggle("hidden", !isFile);
  document.getElementById("textSection").classList.toggle("hidden", isFile);
}

async function loadEnrolledCourses() {
  const res = await api.get("/student/dashboard");
  if (!res?.ok) return;
  const courses = res.data.enrolled_courses || [];
  const opts = courses.map(c => `<option value="${c.course_id}">${escHtml(c.name||c.course_id)}</option>`).join("");
  document.getElementById("courseFilter").innerHTML = `<option value="">All my courses</option>${opts}`;
}

async function loadMySubmissions() {
  const res = await api.get("/assignments/my/submissions");
  if (!res?.ok) return;
  const subs = res.data.submissions || [];
  submissionsMap = {};
  subs.forEach(s => { submissionsMap[s.assignment_id] = s; });
}

async function loadAssignments() {
  const cf = document.getElementById("courseFilter").value;
  const res = await api.get(`/assignments/?page=${page}&per_page=20${cf?"&course_id="+cf:""}`);
  if (!res?.ok) return;
  const { assignments=[], pagination={} } = res.data;
  document.getElementById("aCount").textContent = `Assignments (${pagination.total||assignments.length})`;
  if (!assignments.length) {
    document.getElementById("tbody").innerHTML = `<tr><td colspan="6"><div class="empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:36px;height:36px;opacity:.3;margin-bottom:8px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>No assignments available yet.</p></div></td></tr>`;
    document.getElementById("pagination").innerHTML = ""; return;
  }
  document.getElementById("tbody").innerHTML = assignments.map(a => {
    const sub = submissionsMap[a.assignment_id];
    const isLate = a.due_date && new Date(a.due_date) < new Date() && !sub;
    let statusHtml = sub
      ? statusBadge(sub.status==="graded" ? "graded" : "submitted")
      : isLate ? statusBadge("late") : statusBadge("pending");
    let scoreHtml = sub?.score != null ? `<span style="font-weight:600;color:var(--g8)">${sub.score}/${a.max_score||100}</span>` : "—";
    let actionBtn = sub
      ? `<button class="btn btn-ghost btn-sm" onclick='viewSub(${JSON.stringify(sub)},${a.max_score||100})'>View Result</button>`
      : `<button class="btn btn-primary btn-sm" onclick="openSubmit('${a.assignment_id}','${escHtml(a.title)}','${escHtml(a.description||"")}')">Submit</button>`;
    return `<tr>
      <td><span style="font-weight:500">${escHtml(a.title)}</span></td>
      <td><span class="mono" style="font-size:11px">${escHtml(a.course_id||"—")}</span></td>
      <td style="font-size:12.5px${isLate&&!sub?";color:#b00":""}">${a.due_date?formatDateTime(a.due_date):"—"}</td>
      <td>${a.max_score||"—"}</td>
      <td>${statusHtml}${sub?.score!=null?" "+scoreHtml:""}</td>
      <td style="text-align:right">${actionBtn}</td>
    </tr>`;
  }).join("");
  const el = document.getElementById("pagination"); let html = "";
  for(let i=1;i<=pagination.pages;i++) html+=`<button class="page-btn${i===page?" active":""}" onclick="page=${i};loadAssignments()">${i}</button>`;
  el.innerHTML = html;
}

function openSubmit(aId, title, desc) {
  activeAssignmentId = aId;
  document.getElementById("submitTitle").textContent = `Submit: ${title}`;
  document.getElementById("aDesc").textContent = desc || "No description provided.";
  document.getElementById("submitErr").classList.add("hidden");
  document.getElementById("subFile").value = "";
  document.getElementById("subText").value = "";
  document.getElementById("subType").value = "file";
  toggleSubType();
  document.getElementById("submitModal").classList.remove("hidden");
}
function closeModal(id) { document.getElementById(id).classList.add("hidden"); }

async function submitAssignment() {
  const btn = document.getElementById("submitBtn");
  const err = document.getElementById("submitErr");
  err.classList.add("hidden");
  const type = document.getElementById("subType").value;
  showLoading(btn, "Submitting…");
  let res;
  if (type === "file") {
    const file = document.getElementById("subFile").files[0];
    if (!file) { err.textContent="Please select a file."; err.classList.remove("hidden"); stopLoading(btn); return; }
    const fd = new FormData();
    fd.append("file", file);
    const csrf = _getCsrfToken();
    const raw = await fetch(`/api/assignments/${activeAssignmentId}/submit`, {
      method: "POST",
      headers: csrf ? { "X-CSRF-TOKEN": csrf } : {},
      credentials: "same-origin",
      body: fd
    });
    const data = await raw.json().catch(()=>({}));
    res = { ok: raw.ok, status: raw.status, data };
  } else {
    const text = document.getElementById("subText").value.trim();
    if (!text) { err.textContent="Please enter your answer."; err.classList.remove("hidden"); stopLoading(btn); return; }
    res = await api.post(`/assignments/${activeAssignmentId}/submit`, { text_content: text });
  }
  stopLoading(btn);
  if (res?.ok) {
    closeModal("submitModal"); showToast("Assignment submitted!","success");
    await loadMySubmissions(); loadAssignments();
  } else { err.textContent = res?.data?.error||"Submission failed."; err.classList.remove("hidden"); }
}

function viewSub(sub, maxScore) {
  let html = `<div style="display:grid;gap:10px">`;
  html += `<div><strong>Status:</strong> ${statusBadge(sub.status||"submitted")}</div>`;
  html += `<div><strong>Submitted:</strong> ${formatDateTime(sub.submitted_at)}</div>`;
  if (sub.score != null) html += `<div><strong>Score:</strong> <span style="font-size:18px;font-weight:700">${sub.score}</span> / ${maxScore}</div>`;
  if (sub.feedback) html += `<div><strong>Teacher Feedback:</strong><div style="background:var(--g1);padding:10px;border-radius:6px;margin-top:4px;font-size:13px">${escHtml(sub.feedback)}</div></div>`;
  if (sub.text_content) html += `<div><strong>My Answer:</strong><div style="background:var(--g1);padding:10px;border-radius:6px;margin-top:4px;font-size:13px;white-space:pre-wrap">${escHtml(sub.text_content)}</div></div>`;
  if (sub.file_url) html += `<div><a href="${escHtml(sub.file_url)}" target="_blank" class="btn btn-ghost btn-sm">View Submitted File</a></div>`;
  html += `</div>`;
  document.getElementById("viewContent").innerHTML = html;
  document.getElementById("viewModal").classList.remove("hidden");
}

async function init() {
  await loadEnrolledCourses();
  await loadMySubmissions();
  loadAssignments();
}
init();
</script>
</body></html>
