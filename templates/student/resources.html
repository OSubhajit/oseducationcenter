<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resources — OSEDu Student</title>
<link rel="stylesheet" href="/static/css/osec.css">
</head>
<body>
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="openSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <div style="font-family:var(--fd);font-weight:600;font-size:16px">Resources</div>
      </div>
      <div style="font-size:13px;color:var(--g6)">Study Materials</div>
    </header>
    <main class="page-content">
      <div class="card">
        <div class="card-header">
          <span class="card-title" id="resCount">Resources</span>
          <select id="courseFilter" style="width:200px" onchange="page=1;loadResources()">
            <option value="">All my courses</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Title</th><th>Course</th><th>Type</th><th>Category</th><th>Uploaded</th><th style="text-align:right">Action</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/sidebar.js"></script>
<script>
if (!requireStudent()) throw "";
renderSidebar("resources", "student");

let page = 1;

async function loadEnrolledCourses() {
  const res = await api.get("/student/dashboard");
  if (!res?.ok) return;
  const courses = res.data.enrolled_courses || [];
  const opts = courses.map(c => `<option value="${c.course_id}">${escHtml(c.name||c.course_id)}</option>`).join("");
  document.getElementById("courseFilter").innerHTML = `<option value="">All my courses</option>${opts}`;
  if (courses.length === 1) {
    document.getElementById("courseFilter").value = courses[0].course_id;
  }
}

async function loadResources() {
  const cf = document.getElementById("courseFilter").value;
  const url = cf ? `/resources/course/${cf}` : `/resources/?page=${page}&per_page=20`;
  const res = await api.get(url);
  if (!res?.ok) {
    document.getElementById("tbody").innerHTML = `<tr><td colspan="6"><div class="empty"><p>Failed to load resources.</p></div></td></tr>`;
    return;
  }
  const resources = res.data.resources || res.data || [];
  const list = Array.isArray(resources) ? resources : [];
  document.getElementById("resCount").textContent = `Resources (${list.length})`;
  if (!list.length) {
    document.getElementById("tbody").innerHTML = `<tr><td colspan="6"><div class="empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:36px;height:36px;opacity:.3;margin-bottom:8px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg><p>No resources available for your courses yet.</p></div></td></tr>`;
    document.getElementById("pagination").innerHTML = ""; return;
  }
  document.getElementById("tbody").innerHTML = list.map(r => `<tr>
    <td>
      <span style="font-weight:500">${escHtml(r.title)}</span>
      ${r.description?`<div style="font-size:11.5px;color:var(--g5);margin-top:2px">${escHtml(r.description)}</div>`:""}
    </td>
    <td><span class="mono" style="font-size:11px">${escHtml(r.course_id||"—")}</span></td>
    <td><span class="badge badge-outline">${escHtml(r.resource_type||"file")}</span></td>
    <td style="font-size:12.5px">${escHtml(r.category||"—")}</td>
    <td style="font-size:12px;color:var(--g5)">${formatDate(r.created_at)}</td>
    <td style="text-align:right">
      ${r.external_url
        ? `<a href="${escHtml(r.external_url)}" target="_blank" class="btn btn-primary btn-sm">Open Link</a>`
        : `<a href="/api/resources/${r.resource_id}/download" class="btn btn-primary btn-sm">Download</a>`
      }
    </td>
  </tr>`).join("");
  if (res.data.pagination) {
    const p = res.data.pagination; let html = "";
    for(let i=1;i<=p.pages;i++) html+=`<button class="page-btn${i===page?" active":""}" onclick="page=${i};loadResources()">${i}</button>`;
    document.getElementById("pagination").innerHTML = html;
  } else { document.getElementById("pagination").innerHTML = ""; }
}

loadEnrolledCourses().then(loadResources);
</script>
</body></html>
