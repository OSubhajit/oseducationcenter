<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Dashboard — OSEDu</title>
<link rel="stylesheet" href="/static/css/osec.css">
</head>
<body>
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="openSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <div>
          <div style="font-family:var(--fd);font-weight:600;font-size:16px">Dashboard</div>
          <div style="font-size:11.5px;color:var(--g5)">Welcome back, <span id="studentName"></span></div>
        </div>
      </div>
      <span class="mono" id="studentId" style="font-size:12px;color:var(--g5)"></span>
    </header>
    <main class="page-content">
      <!-- Stats -->
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">Enrolled Courses</div><div class="stat-value" id="sCourses">—</div></div>
        <div class="stat-card"><div class="stat-label">Exams Taken</div><div class="stat-value" id="sExams">—</div></div>
        <div class="stat-card"><div class="stat-label">Passed</div><div class="stat-value" id="sPassed">—</div></div>
        <div class="stat-card"><div class="stat-label">Certificates</div><div class="stat-value" id="sCerts">—</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <!-- Available Exams -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Available Exams</span>
          </div>
          <div id="availExams">
            <div style="text-align:center;padding:24px;color:var(--g5);font-size:13px">Loading…</div>
          </div>
        </div>

        <!-- My Courses -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">My Courses</span>
          </div>
          <div id="myCourses">
            <div style="text-align:center;padding:24px;color:var(--g5);font-size:13px">Loading…</div>
          </div>
        </div>

        <!-- Fee Status -->
        <div class="card" style="grid-column:1/-1">
          <div class="card-header">
            <span class="card-title">Fee Status</span>
            <a href="/student/results" class="btn btn-ghost btn-sm">View results</a>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Course</th><th>Total</th><th>Paid</th><th>Due</th><th>Status</th></tr></thead>
              <tbody id="feeTable"><tr><td colspan="5" style="text-align:center;color:var(--g5);padding:20px">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/sidebar.js"></script>
<script>
if (!requireStudent()) throw "";
renderSidebar("dashboard","student");
document.getElementById("studentName").textContent = Auth.getName() || "Student";
document.getElementById("studentId").textContent = Auth.getStudentId() || "";

async function loadDashboard(){
  const res = await api.get("/student/dashboard");
  if (!res?.ok) return;
  const d = res.data;

  document.getElementById("sCourses").textContent = (d.enrolled_courses||[]).length;
  document.getElementById("sExams").textContent   = (d.recent_results||[]).length;
  document.getElementById("sPassed").textContent  = (d.recent_results||[]).filter(r=>r.passed).length;
  document.getElementById("sCerts").textContent   = (d.certificates||[]).length;

  const avail = d.available_exams || [];
  document.getElementById("availExams").innerHTML = avail.length ? avail.map(e=>`
    <div style="padding:12px 0;border-bottom:1px solid var(--g2);display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
      <div>
        <div style="font-weight:500;font-size:13.5px">${escHtml(e.title)}</div>
        <div style="font-size:12px;color:var(--g5);margin-top:2px">${e.duration_minutes} min &bull; ${e.total_questions} questions</div>
        <div style="font-size:11.5px;color:var(--g5)">${escHtml(e.course_name||e.course_id)}</div>
      </div>
      <a href="/exam/${e.exam_id}" class="btn btn-primary btn-sm" style="flex-shrink:0">Start</a>
    </div>`).join("") : `<div class="empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>No exams available right now.</p></div>`;

  const courses = d.enrolled_courses || [];
  document.getElementById("myCourses").innerHTML = courses.length ? courses.map(c=>`
    <div style="padding:11px 0;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-weight:500;font-size:13.5px">${escHtml(c.name||c.course_id)}</div>
        <div style="font-size:12px;color:var(--g5)">${c.category||""} &bull; ${c.duration_weeks||"—"}w</div>
      </div>
      <span class="badge badge-success">Enrolled</span>
    </div>`).join("") : `<div class="empty"><p>Not enrolled in any courses yet.</p></div>`;

  const fees = d.fee_records || [];
  document.getElementById("feeTable").innerHTML = fees.length ? fees.map(f=>`<tr>
    <td><span class="mono" style="font-size:11px">${escHtml(f.course_id)}</span></td>
    <td>₹${(f.total_amount||0).toLocaleString("en-IN")}</td>
    <td>₹${(f.paid_amount||0).toLocaleString("en-IN")}</td>
    <td>₹${(f.due_amount||0).toLocaleString("en-IN")}</td>
    <td>${statusBadge(f.status)}</td>
  </tr>`).join("") : `<tr><td colspan="5" style="text-align:center;color:var(--g5);padding:16px">No fee records.</td></tr>`;
}
loadDashboard();
</script>
</body></html>
