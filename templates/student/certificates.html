<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Certificates — OSEDu</title>
<link rel="stylesheet" href="/static/css/osec.css">
</head>
<body>
<div class="layout">
  <div id="sidebarContainer"></div>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="openSidebar()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <div style="font-family:var(--fd);font-weight:600;font-size:16px">My Certificates</div>
      </div>
    </header>

    <main class="page-content">
      <div id="certGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">
        <div style="text-align:center;padding:40px;color:var(--g5);grid-column:1/-1">Loading…</div>
      </div>
    </main>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/sidebar.js"></script>
<script>
if (!requireStudent()) throw "";
renderSidebar("certificates","student");

async function loadCertificates() {
  const res = await api.get("/student/certificates");
  if (!res?.ok) return;
  const certs = res.data.certificates || [];
  const grid  = document.getElementById("certGrid");

  if (!certs.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1">
        <div class="empty" style="padding:64px 20px">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
          </svg>
          <p style="font-size:15px;font-weight:500;color:var(--g7);margin-bottom:6px">No certificates yet</p>
          <p style="font-size:13px">Pass an exam to earn your first certificate.</p>
        </div>
      </div>`;
    return;
  }

  grid.innerHTML = certs.map(c => `
    <div class="card" style="padding:0;overflow:hidden">
      <!-- Header strip -->
      <div style="background:var(--black);padding:18px 20px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-family:var(--fd);font-weight:700;font-size:13px;color:var(--white);letter-spacing:.04em;text-transform:uppercase">Certificate of Completion</div>
          <div style="font-size:11px;color:#888;margin-top:3px">OS Education Center</div>
        </div>
        <div style="width:36px;height:36px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#111" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
          </svg>
        </div>
      </div>

      <!-- Body -->
      <div style="padding:18px 20px">
        <div style="margin-bottom:14px">
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--g5);margin-bottom:3px">Course</div>
          <div style="font-weight:600;font-size:14.5px;font-family:var(--fd)">${escHtml(c.course_name || c.course_id)}</div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">
          <div>
            <div style="font-size:10.5px;color:var(--g5);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Grade</div>
            <div class="grade ${gradeClass(c.grade)}" style="font-size:20px">${escHtml(c.grade || '—')}</div>
          </div>
          <div>
            <div style="font-size:10.5px;color:var(--g5);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Score</div>
            <div style="font-weight:600;font-size:14px">${c.percentage != null ? c.percentage + '%' : '—'}</div>
          </div>
          <div>
            <div style="font-size:10.5px;color:var(--g5);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Issued</div>
            <div style="font-size:13px">${formatDate(c.issued_at)}</div>
          </div>
        </div>

        <div style="background:var(--g1);border-radius:5px;padding:8px 10px;margin-bottom:14px;display:flex;align-items:center;gap:8px">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:var(--g5);flex-shrink:0">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
          <span class="mono" style="font-size:11px;word-break:break-all">${escHtml(c.cert_id)}</span>
        </div>

        <div style="display:flex;gap:8px">
          <a href="/api/verify/${escHtml(c.cert_id)}/page" target="_blank" class="btn btn-secondary btn-sm" style="flex:1;justify-content:center">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            Verify
          </a>
          ${c.pdf_url ? `<a href="${escHtml(c.pdf_url)}" target="_blank" class="btn btn-primary btn-sm" style="flex:1;justify-content:center">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Download PDF
          </a>` : ''}
        </div>
      </div>
    </div>`).join("");
}

loadCertificates();
</script>
</body></html>
